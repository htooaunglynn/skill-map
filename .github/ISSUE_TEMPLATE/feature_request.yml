name: Feature request
description: Suggest an improvement or new capability.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        SkillMap is local-first. Please avoid requests that require backend storage, accounts, OAuth, or cloud APIs unless you are proposing a spec change.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What learning-planner problem does this solve?
      placeholder: I want to...
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What should SkillMap do?
    validations:
      required: true
  - type: textarea
    id: local_first
    attributes:
      label: Local-first fit
      description: How can this work without a backend, account system, or cloud API?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Goals and milestones
        - Practice sessions
        - Progress notes
        - Local file storage
        - Import/export
        - UI and accessibility
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional. Are there simpler approaches or workarounds?

